spring:

  mvc:
    throw-exception-if-no-handler-found: true

  application:
    name: demo

  datasource:
    url: jdbc:h2:mem:based_data;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect
        hbm2ddl:
          auto: create-drop
    defer-datasource-initialization: true
    database-platform: org.hibernate.dialect.H2Dialect

  sql:
    init:
      mode: always
      continue-on-error: false
      platform: h2

server:
  port: 8080

logging:
  level:
    root: WARN
    org.hibernate: ERROR
    org.springframework: ERROR
    com.zaxxer.hikari: ERROR